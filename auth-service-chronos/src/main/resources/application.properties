spring.application.name=auth-service-chronos
# A secure 256-bit Base64 encoded string (You can generate a random one online)
jwt.secret=${FIN_JWT_SECRET}
# Expiration time in milliseconds (e.g., 1 day = 86400000)
jwt.expiration=86400000
server.port=8081
# Connect the Auth Service to the shared Postgres Database
spring.datasource.url=jdbc:postgresql://localhost:5432/chronos_db
spring.datasource.username=postgres
spring.datasource.password=${FIN_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
