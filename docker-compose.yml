version: '3.8'

services:
  # ------------------------------------
  # 1. THE INFRASTRUCTURE
  # ------------------------------------
  postgres-db:
    image: postgres:15-alpine
    container_name: chronos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${FIN_DB_PASSWORD}
      POSTGRES_DB: chronos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: chronos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: ${FIN_RMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"

  # ------------------------------------
  # 2. THE MICROSERVICES
  # ------------------------------------
  auth-service:
    build: ./auth-service-chronos
    container_name: chronos-auth
    env_file:
      - Secrets.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/chronos_db
      - SPRING_DATASOURCE_USERNAME=postgres
    ports:
      - "8081:8081"
    depends_on:
      postgres-db:
        condition: service_healthy

  job-api:
    build: ./job-api-chronos
    container_name: chronos-job-api
    env_file:
      - Secrets.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/chronos_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_RABBITMQ_HOST=rabbitmq
    ports:
      - "8082:8082"
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  job-worker:
    build: ./worker-engine-chronos
    container_name: chronos-job-worker
    env_file:
      - Secrets.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/chronos_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_RABBITMQ_HOST=rabbitmq
    ports:
      - "8083:8083"
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

volumes:
  postgres_data: