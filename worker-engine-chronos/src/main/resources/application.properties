spring.application.name=worker-engine-chronos
server.port=8083

# ---- Database (should match the same DB used by job-api) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/chronos_db
spring.datasource.username=postgres
spring.datasource.password=${FIN_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ---- RabbitMQ ----
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=${FIN_RMQ_PASSWORD}

# ---- Actuator (optional) ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always